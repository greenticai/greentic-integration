name: Integration

permissions:
  contents: read
  packages: read

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Cargo fmt
        run: cargo fmt -- --check
      - name: Cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  packs:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate pack fixtures
        run: make packs.test

  harness:
    runs-on: ubuntu-latest
    needs:
      - lint
      - packs
    steps:
      - uses: actions/checkout@v4
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo builds
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - name: Renderer snapshot tests
        run: make render.snapshot
      - name: Runner smoke harness
        run: make runner.smoke

  messaging-provider:
    runs-on: ubuntu-latest
    needs:
      - harness
    steps:
      - uses: actions/checkout@v4
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo builds
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - name: Messaging/provider E2E
        env:
          E2E_REQUIRE_DOCKER: "1"
        run: cargo test -p greentic-integration --test e2e_messaging_provider -- --nocapture

  webchat:
    runs-on: ubuntu-latest
    needs:
      - packs
    strategy:
      fail-fast: false
      matrix:
        project: ${{ fromJson(github.event_name == 'schedule' && '["chromium","firefox"]' || '["chromium"]') }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: webchat-e2e/package-lock.json
      - name: Install npm dependencies
        run: npm ci
        working-directory: webchat-e2e
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: webchat-e2e/node_modules/.cache/ms-playwright/${{ matrix.project }}
          key: ${{ runner.os }}-playwright-${{ matrix.project }}-${{ hashFiles('webchat-e2e/package-lock.json') }}
      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: PLAYWRIGHT_BROWSERS_PATH=0 npx playwright install ${{ matrix.project }}
        working-directory: webchat-e2e
      - name: WebChat contract tests
        run: make webchat.contract
      - name: Playwright e2e
        env:
          PLAYWRIGHT_PROJECT: ${{ matrix.project }}
        run: make webchat.e2e

  pack-audit:
    runs-on: ubuntu-latest
    needs:
      - lint
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install crane
        run: |
          curl -fsSL https://github.com/google/go-containerregistry/releases/download/v0.20.1/go-containerregistry_Linux_x86_64.tar.gz \
            | sudo tar -xz -C /usr/local/bin crane
      - name: GHCR login for crane
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: |
          set -euo pipefail
          token="${GHCR_TOKEN:-${GITHUB_TOKEN:-}}"
          if [[ -z "${token}" ]]; then
            echo "GHCR token missing; set GHCR_TOKEN or ensure GITHUB_TOKEN is available"
            exit 1
          fi
          echo "${token}" | crane auth login ghcr.io -u "${GITHUB_ACTOR:-oauth2}" --password-stdin
      - name: Pack audit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          GT_CRANE_LOGIN: "0"
        run: |
          set -euo pipefail
          cargo run -p greentic-integration --bin pack_audit
      - name: Pack audit tests
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cargo test -p greentic-integration pack_audit_ -- --nocapture

  nightly-test-all:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    needs:
      - lint
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo builds
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - name: Install Node.js for webchat
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: webchat-e2e/package-lock.json
      - name: Install Playwright browsers (chromium + firefox)
        run: |
          npm ci --prefix webchat-e2e
          PLAYWRIGHT_BROWSERS_PATH=0 npx playwright install chromium firefox
      - name: Run full test suite
        env:
          GREENTIC_PROVIDER_CORE_ONLY: "1"
          GREENTIC_INTEGRATION_STRICT: "1"
          GREENTIC_PACK_NO_FALLBACK: "1"
          GREENTIC_STACK_STRICT: "1"
          GREENTIC_DEV_E2E_STRICT: "1"
        run: |
          set -euo pipefail
          make test.all
