name: CI setup
description: Set up Rust tooling and Greentic dependencies for CI
inputs:
  rust-toolchain:
    description: Rust toolchain version
    required: false
    default: 1.91.0
runs:
  using: composite
  steps:
    - name: Add local bin to PATH
      shell: bash
      run: |
        mkdir -p "$HOME/.local/bin"
        echo "$HOME/.local/bin" >> "$GITHUB_PATH"
    - name: Cache rustup
      uses: actions/cache@v4
      with:
        path: ~/.rustup
        key: rustup-${{ runner.os }}-${{ inputs.rust-toolchain }}-wasm32-wasip2
    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: ${{ inputs.rust-toolchain }}
        targets: wasm32-wasip2
    - name: Cache cargo
      uses: Swatinem/rust-cache@v2
    - name: Cache tools
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/bin
          ~/.cache/cargo-binstall
          ~/.local/bin
        key: tools-${{ runner.os }}-v1
    - name: Install cargo-binstall
      shell: bash
      run: |
        if ! command -v cargo-binstall >/dev/null 2>&1; then
          curl -sL https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash
        fi
    - name: Install greentic-dev
      shell: bash
      run: |
        if ! command -v greentic-dev >/dev/null 2>&1; then
          cargo binstall greentic-dev --no-confirm --force
        fi
    - name: Install cargo-component
      shell: bash
      run: |
        if ! command -v cargo-component >/dev/null 2>&1; then
          cargo binstall cargo-component --no-confirm --force
        fi
    - name: Prefetch canonical greentic WIT source
      shell: bash
      run: |
        tmp_dir="$(mktemp -d)"
        trap 'rm -rf "$tmp_dir"' EXIT
        mkdir -p "$tmp_dir/src"
        cat >"$tmp_dir/src/lib.rs" <<'EOF'
        pub fn _prefetch_marker() {}
        EOF
        cat >"$tmp_dir/Cargo.toml" <<'EOF'
        [package]
        name = "prefetch-greentic-interfaces"
        version = "0.0.0"
        edition = "2021"

        [dependencies]
        greentic-interfaces = { version = "0.4", default-features = false }
        EOF
        cargo fetch --manifest-path "$tmp_dir/Cargo.toml"
    - name: Materialize canonical greentic WIT siblings for crates.io guest builds
      shell: bash
      run: |
        set -euo pipefail
        cargo_home="${CARGO_HOME:-$HOME/.cargo}"
        registry_src_root="$(find "${cargo_home}/registry/src" -maxdepth 1 -type d -name 'index.crates.io-*' | head -n 1)"
        if [[ -z "${registry_src_root:-}" ]]; then
          echo "cargo registry src root not found under ${cargo_home}/registry/src" >&2
          exit 1
        fi

        materialize_version() {
          local version="$1"
          local interfaces_dir="${registry_src_root}/greentic-interfaces-${version}"
          local archive_url="https://crates.io/api/v1/crates/greentic-interfaces/${version}/download"
          local tmp_archive
          local tmp_unpack

          if [[ -d "${interfaces_dir}/wit" ]]; then
            echo "canonical greentic-interfaces wit already present at ${interfaces_dir}/wit"
            return 0
          fi

          tmp_archive="$(mktemp)"
          tmp_unpack="$(mktemp -d)"
          curl -fsSL -H "User-Agent: greentic-ci (https://github.com/greenticai)" "${archive_url}" -o "${tmp_archive}"
          tar -xzf "${tmp_archive}" -C "${tmp_unpack}"

          local extracted_dir="${tmp_unpack}/greentic-interfaces-${version}"
          if [[ ! -d "${extracted_dir}/wit" ]]; then
            echo "downloaded greentic-interfaces archive missing wit/ at ${extracted_dir}" >&2
            rm -f "${tmp_archive}"
            rm -rf "${tmp_unpack}"
            return 1
          fi

          rm -rf "${interfaces_dir}"
          cp -R "${extracted_dir}" "${interfaces_dir}"
          rm -f "${tmp_archive}"
          rm -rf "${tmp_unpack}"
          echo "materialized canonical wit sibling at ${interfaces_dir}"
        }

        shopt -s nullglob
        guest_dirs=("${registry_src_root}"/greentic-interfaces-guest-*)
        if (( ${#guest_dirs[@]} == 0 )); then
          echo "no greentic-interfaces-guest crates unpacked yet; materializing fallback version 0.4.107"
          materialize_version "0.4.107"
          exit 0
        fi

        for guest_dir in "${guest_dirs[@]}"; do
          guest_name="$(basename "${guest_dir}")"
          version="${guest_name#greentic-interfaces-guest-}"
          materialize_version "${version}"
        done
    - name: Install crane
      shell: bash
      run: |
        if ! command -v crane >/dev/null 2>&1; then
          curl -sL https://github.com/google/go-containerregistry/releases/download/v0.20.3/crane-linux-amd64 -o "$HOME/.local/bin/crane"
          chmod +x "$HOME/.local/bin/crane"
        fi
