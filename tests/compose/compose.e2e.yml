services:
  nats:
    image: nats:2.10.20-alpine
    command:
      - --js
      - --server_name=greentic-e2e
      - --http_port=9223
    ports:
      - target: 4222
        published: 0
        host_ip: 127.0.0.1
      - target: 9223
        published: 0
        host_ip: 127.0.0.1
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9223/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - target: 5432
        published: 0
        host_ip: 127.0.0.1
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
